<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Атланты — прототип дуэли</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0d10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Атланты">
<link rel="apple-touch-icon" href="img/icon-192.png">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none; }
  /* touch-action:none — иначе браузер считает жест прокруткой и обрывает перетаскивание */
  html, body { width:100%; height:100%; background:#0a0d10; overflow:hidden;
    touch-action:none; overscroll-behavior:none;
    font-family:"Segoe UI", system-ui, sans-serif; }

  /* Сцена ровно в размерах фрейма Figma — масштабируется целиком,
     поэтому пропорции всей графики сохраняются один в один. */
  #stage { position:absolute; width:2597.4px; height:1568.8px;
    transform-origin:0 0; overflow:hidden; }
  #stage img, #stage svg { position:absolute; display:block; pointer-events:none; }
  .lay { position:absolute; }

  /* --fx: -1 отражает персонажа (у Афины слой зеркальный, как в Figma) */
  .char { transform:scaleX(var(--fx,1)); }

  .name { position:absolute; font-size:42.75px; color:#fff; letter-spacing:1px; font-weight:600;
    text-shadow:0 3px 6px rgba(0,0,0,.85); white-space:nowrap; }
  .val { position:absolute; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,.85);
    display:flex; align-items:center; justify-content:center; font-weight:700; }

  .hpwrap { position:absolute; width:667px; height:53px; }
  .hpempty { position:absolute; inset:0; background:rgba(0,0,0,.5); border-radius:8px; }
  .hpclip { position:absolute; top:0; bottom:0; left:0; overflow:hidden; transition:width .35s ease; }
  .hpclip.right { left:auto; right:0; }
  .hpclip img { top:0; }
  .hptext { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:36px; font-weight:700; color:#fff; text-shadow:0 2px 5px rgba(0,0,0,.95); }

  .pip { position:absolute; width:79.8px; height:36.7px; background:#43BEF3;
    box-shadow:0 2px 5px rgba(0,0,0,.5); transition:background .2s; }
  .pip.off { background:#16323f; }

  /* карта: графика 335x477 нативная, меняются кайма и текст */
  .card { position:absolute; width:335px; height:477px; touch-action:none; }
  .card .art { position:absolute; left:0; top:0; width:335px; height:477px; border-radius:18px; }
  .card .edge { position:absolute; left:0; top:0; width:335px; height:477px;
    border:9px solid #C74B41; border-radius:18px; }
  .card .cost { position:absolute; left:20px; top:2px; width:44px; height:80px;
    display:flex; align-items:center; justify-content:center;
    font-size:42.75px; font-weight:700; color:#fff; text-shadow:0 2px 5px #000; }
  .card .title { position:absolute; left:16px; top:208px; width:303px; height:68px;
    display:flex; align-items:center; justify-content:center; text-align:center;
    font-size:23px; font-weight:600; color:#fff; line-height:1.1; }
  .card .desc { position:absolute; left:28px; top:288px; width:279px; height:112px;
    display:flex; flex-direction:column; align-items:flex-start; justify-content:center;
    text-align:left; font-size:21px; color:#3d2919; line-height:1.4; padding-left:14px; }
  .dline { white-space:nowrap; }
  .card .type { position:absolute; left:36px; top:398px; width:263px; height:46px;
    display:flex; align-items:center; justify-content:center;
    font-size:28px; font-weight:600; letter-spacing:3px; color:#73573c; }
  .buffed { color:#1f9d3d; font-weight:800; }
  /* иконки параметров вместо слов — экономят место в описании.
     #stage img задан absolute, поэтому здесь возвращаем иконки в поток текста */
  #stage img.ic, img.ic { position:static; display:inline-block;
    height:1.05em; width:auto; vertical-align:-0.18em; }
  .ic-nrg { display:inline-block; width:1em; height:0.62em; background:#43BEF3;
    border-radius:2px; vertical-align:0.02em; }
  .ic-hp { color:#c0392b; font-weight:700; }

  .card.inhand { cursor:grab; transition:transform .18s ease, top .25s ease, left .25s ease; }
  .card.inhand:hover { transform:translateY(-38px); }
  .card.dragging { cursor:grabbing; transition:none; z-index:900;
    filter:drop-shadow(0 24px 34px rgba(0,0,0,.7)); transform:none; }
  .card.locked { filter:grayscale(.7) brightness(.55); cursor:not-allowed; }
  .card.locked:hover { transform:none; }

  #dropzone { position:absolute; left:860px; top:300px; width:880px; height:700px;
    border:6px dashed rgba(255,255,255,.35); border-radius:36px; opacity:0;
    transition:opacity .2s, border-color .2s, background .2s; pointer-events:none; }
  #dropzone.show { opacity:1; }
  #dropzone.hot { border-color:#ffd76a; background:rgba(255,215,106,.12); }
  #dropzone .hint { position:absolute; left:0; right:0; top:40px; text-align:center;
    color:rgba(255,255,255,.65); font-size:34px; letter-spacing:4px; font-weight:600; }

  #played { position:absolute; left:1131px; top:460px; width:335px; height:477px;
    opacity:0; transform:scale(.7); transition:opacity .3s, transform .3s; }
  #played.show { opacity:1; transform:scale(1); }

  #btnEnd { position:absolute; left:2169px; top:1267px; width:400px; height:140px;
    border-radius:24px; background:#D9A847; border:4px solid #FFDE9A; color:#231803;
    font-size:36px; font-weight:700; letter-spacing:1.5px; cursor:pointer;
    box-shadow:0 6px 14px rgba(0,0,0,.55); }
  #btnEnd:disabled { filter:grayscale(.8) brightness(.65); cursor:default; }

  .pile { position:absolute; width:150px; height:208px; border-radius:14px;
    background:rgba(18,28,46,.88); border:3px solid #B88F42;
    display:flex; align-items:center; justify-content:center;
    font-size:54px; font-weight:700; color:#fff; text-shadow:0 2px 5px #000; }
  .pileLabel { position:absolute; width:150px; height:30px; text-align:center;
    font-size:17px; font-weight:600; letter-spacing:1.5px; color:#c2c9d4;
    text-shadow:0 2px 4px #000; }

  #turnNo { position:absolute; left:1148px; top:42px; width:300px; height:58px;
    text-align:center; font-size:42px; font-weight:700; letter-spacing:2px; color:#fff;
    text-shadow:0 3px 6px rgba(0,0,0,.85); }
  #roomCode { position:absolute; left:1148px; top:104px; width:300px; height:34px;
    text-align:center; font-size:21px; font-weight:500; letter-spacing:1.5px;
    color:#c6cdd6; text-shadow:0 2px 5px #000; }
  #turnFlag { position:absolute; left:1048px; top:972px; width:500px; height:64px;
    text-align:center; font-size:46px; font-weight:700; letter-spacing:3px;
    color:#D9A847; text-shadow:0 3px 6px rgba(0,0,0,.9); }

  #oppBack { position:absolute; left:2392px; top:360px; width:96px; height:134px;
    border-radius:14px; background:rgba(18,28,46,.88); border:3px solid #B88F42;
    display:flex; align-items:center; justify-content:center;
    font-size:46px; font-weight:700; color:#fff; text-shadow:0 2px 5px #000; }
  #oppLabel { position:absolute; left:2319px; top:309px; width:186px; height:54px;
    text-align:right; font-size:19px; font-weight:600; color:#c2c9d4;
    text-shadow:0 2px 4px #000; line-height:54px; }

  .float { position:absolute; font-size:110px; font-weight:900; pointer-events:none;
    -webkit-text-stroke:6px #fff; text-shadow:0 6px 12px rgba(0,0,0,.7);
    animation:floatUp 1.25s ease-out forwards; }
  .float.dmg { color:#E33A2E; }
  .float.blk { color:#43BEF3; }
  .float.heal { color:#4FBE6A; }
  .float.buff { color:#D9A847; -webkit-text-stroke:5px #fff; font-size:76px; }
  @keyframes floatUp {
    0% { transform:translateY(0) scale(.5); opacity:0; }
    22% { transform:translateY(-18px) scale(1.15); opacity:1; }
    70% { transform:translateY(-90px) scale(1); opacity:1; }
    100% { transform:translateY(-190px) scale(.95); opacity:0; }
  }
  .shake { animation:shake .4s ease; }
  @keyframes shake {
    0%,100% { transform:translateX(0) scaleX(var(--fx,1)); }
    20% { transform:translateX(26px) scaleX(var(--fx,1)); }
    45% { transform:translateX(-14px) scaleX(var(--fx,1)); }
    70% { transform:translateX(9px) scaleX(var(--fx,1)); }
  }

  #over { position:absolute; inset:0; background:rgba(4,8,12,.82); display:none;
    align-items:center; justify-content:center; flex-direction:column; gap:44px; z-index:1000; }
  #over.show { display:flex; }
  #over h1 { font-size:150px; color:#D9A847; letter-spacing:8px;
    text-shadow:0 8px 20px rgba(0,0,0,.9); }
  #over button { padding:26px 76px; font-size:38px; font-weight:700; border:none;
    border-radius:22px; background:#D9A847; color:#231803; cursor:pointer; }

  /* портретная ориентация: игра горизонтальная, просим повернуть устройство */
  #rotate { position:fixed; inset:0; background:#0a0d10; color:#D9A847; z-index:2000;
    display:none; align-items:center; justify-content:center; flex-direction:column;
    gap:28px; text-align:center; padding:40px; font-size:26px; font-weight:600;
    line-height:1.5; }
  #rotate .ico { font-size:76px; }
  body.portrait #rotate { display:flex; }

  /* кнопка полного экрана: полноэкранный режим требует жеста пользователя */
  #fs { position:fixed; top:10px; right:12px; z-index:1500; width:46px; height:46px;
    border:none; border-radius:12px; background:rgba(10,16,22,.62); color:#e8d9b0;
    font-size:24px; line-height:1; cursor:pointer; backdrop-filter:blur(4px);
    display:flex; align-items:center; justify-content:center; }
  #fs:active { background:rgba(10,16,22,.9); }
  body.fs #fs, body.standalone #fs { display:none; }

  /* отладочный лог */
  #logBox { position:absolute; left:60px; top:430px; width:650px; height:560px;
    background:rgba(0,0,0,.55); border:2px solid rgba(255,255,255,.18); border-radius:16px;
    padding:14px 18px; display:flex; flex-direction:column-reverse;
    overflow-y:auto; touch-action:pan-y; overscroll-behavior:contain; }
  #logBox::-webkit-scrollbar { width:10px; }
  #logBox::-webkit-scrollbar-track { background:rgba(255,255,255,.06); border-radius:5px; }
  #logBox::-webkit-scrollbar-thumb { background:rgba(255,255,255,.28); border-radius:5px; }
  #logBox .line { font-size:20px; line-height:1.45; color:#dbe3ea;
    font-family:Consolas, "Cascadia Mono", monospace; white-space:pre-wrap; }
  #logBox .line.turn { color:#D9A847; margin-top:6px; }
  #logBox .line.you  { color:#8fd7ff; }
  #logBox .line.foe  { color:#ffb0a6; }
  body.nolog #logBox { display:none; }
  #logToggle { position:fixed; top:10px; right:66px; z-index:1500; width:46px; height:46px;
    border:none; border-radius:12px; background:rgba(10,16,22,.62); color:#e8d9b0;
    font-size:22px; line-height:1; cursor:pointer; display:flex;
    align-items:center; justify-content:center; }
  #logToggle:active { background:rgba(10,16,22,.9); }

  /* ---------- стартовый экран и редактор колод ---------- */
  .screen { position:absolute; inset:0; background:rgba(4,8,12,.94); z-index:1300;
    display:none; flex-direction:column; padding:44px 60px; }
  .screen.show { display:flex; }
  .scr-head { display:flex; align-items:center; gap:26px; flex:0 0 auto; margin-bottom:22px;
    font-size:44px; font-weight:700; color:#D9A847; letter-spacing:2px; }
  .btn { border:none; border-radius:16px; background:#D9A847; color:#231803;
    font-size:30px; font-weight:700; padding:16px 34px; cursor:pointer; }
  .btn.ghost { background:rgba(255,255,255,.12); color:#e8eef4; }
  .btn:disabled { filter:grayscale(.7) brightness(.6); cursor:default; }
  .scr-head .btn { padding:12px 26px; font-size:26px; }
  .spacer { margin-left:auto; }

  #startScreen .ss-title { font-size:96px; font-weight:700; color:#D9A847; letter-spacing:10px;
    text-align:center; margin:40px 0 10px; }
  #startScreen .ss-sub { text-align:center; color:#98a5b2; font-size:26px; margin-bottom:40px; }
  #startScreen .ss-list { flex:1 1 auto; overflow-y:auto; touch-action:pan-y;
    overscroll-behavior:contain; display:flex; flex-direction:column; gap:14px;
    max-width:1200px; width:100%; margin:0 auto; }
  .ss-item { display:flex; align-items:center; gap:20px; padding:20px 26px; border-radius:14px;
    background:rgba(255,255,255,.07); border:3px solid transparent; cursor:pointer; }
  .ss-item.sel { border-color:#D9A847; background:rgba(217,168,71,.16); }
  .ss-item .ss-name { font-size:32px; font-weight:600; color:#fff; }
  .ss-item .ss-info { margin-left:auto; font-size:24px; color:#a7b4c0; }
  #startScreen .ss-actions { flex:0 0 auto; display:flex; gap:20px; justify-content:center;
    margin-top:34px; }

  .ed-slots { flex:0 0 auto; display:grid; grid-template-columns:repeat(10, 235px);
    gap:14px; justify-content:center; margin-bottom:20px; }
  .ed-label { flex:0 0 auto; font-size:26px; color:#a7b4c0; letter-spacing:2px; margin-bottom:10px; }
  .ed-avail { flex:1 1 auto; overflow-y:auto; touch-action:pan-y; overscroll-behavior:contain;
    display:grid; grid-template-columns:repeat(10, 235px); gap:14px;
    justify-content:center; align-content:start; padding-right:12px; }
  .ed-avail::-webkit-scrollbar, #startScreen .ss-list::-webkit-scrollbar { width:12px; }
  .ed-avail::-webkit-scrollbar-track, #startScreen .ss-list::-webkit-scrollbar-track {
    background:rgba(255,255,255,.06); border-radius:6px; }
  .ed-avail::-webkit-scrollbar-thumb, #startScreen .ss-list::-webkit-scrollbar-thumb {
    background:rgba(255,255,255,.3); border-radius:6px; }

  /* карта в редакторе — тот же вид, что в руке, только уменьшенный */
  .mini { position:relative; width:235px; height:334px; cursor:pointer; touch-action:pan-y; }
  /* у карты в руке touch-action:none ради перетаскивания;
     в редакторе это мешало прокрутке пальцем — возвращаем вертикальный жест */
  .mini .card { touch-action:pan-y; }
  .mini .card { position:absolute; left:0; top:0; transform:scale(.7); transform-origin:0 0; }
  .mini:hover .card { filter:brightness(1.18); }
  .slot { width:235px; height:334px; border:4px dashed rgba(255,255,255,.22);
    border-radius:14px; display:flex; align-items:center; justify-content:center;
    font-size:34px; color:rgba(255,255,255,.25); }
  #edName { font-size:28px; padding:12px 18px; border-radius:12px; border:3px solid #3a4654;
    background:rgba(255,255,255,.08); color:#fff; width:420px; }
  #edCount { font-size:30px; font-weight:700; color:#e8eef4; }


  /* просмотр колоды */
  .pile.clickable { cursor:pointer; }
  .pile.clickable:active { border-color:#FFDE9A; }
  #deckView { position:absolute; inset:0; background:rgba(4,8,12,.9); z-index:1200;
    display:none; flex-direction:column; padding:40px 60px; }
  #deckView.show { display:flex; }
  #deckView .dv-head { display:flex; align-items:center; gap:24px; flex:0 0 auto;
    font-size:44px; font-weight:700; color:#D9A847; letter-spacing:2px; margin-bottom:24px; }
  #deckView .dv-close { margin-left:auto; width:70px; height:70px; border:none; border-radius:16px;
    background:#D9A847; color:#231803; font-size:36px; font-weight:700; cursor:pointer; }
  #deckView .dv-list { flex:1 1 auto; overflow-y:auto; touch-action:pan-y;
    overscroll-behavior:contain; display:grid; grid-template-columns:1fr 1fr;
    gap:14px 28px; align-content:start; padding-right:14px; }
  #deckView .dv-list::-webkit-scrollbar { width:12px; }
  #deckView .dv-list::-webkit-scrollbar-track { background:rgba(255,255,255,.06); border-radius:6px; }
  #deckView .dv-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,.3); border-radius:6px; }
  .dv-row { display:flex; align-items:flex-start; gap:18px; background:rgba(255,255,255,.06);
    border-left:8px solid #C74B41; border-radius:12px; padding:14px 18px; }
  .dv-row .dv-cost { flex:0 0 54px; height:54px; border-radius:50%; background:#D9A847;
    color:#231803; font-size:30px; font-weight:700; display:flex;
    align-items:center; justify-content:center; }
  .dv-row .dv-body { flex:1 1 auto; }
  .dv-row .dv-name { font-size:27px; font-weight:600; color:#fff; }
  .dv-row .dv-text { font-size:21px; color:#c3cbd4; line-height:1.3; margin-top:4px; }
  .dv-row .dv-mult { flex:0 0 auto; font-size:28px; font-weight:700; color:#D9A847; }
  .dv-group { grid-column:1 / -1; font-size:30px; font-weight:700; letter-spacing:3px;
    margin:18px 0 2px; }
  .dv-hand { margin-left:12px; font-size:19px; font-weight:600; color:#231803;
    background:#D9A847; border-radius:10px; padding:2px 10px; vertical-align:2px; }
</style>
</head>
<body>
<div id="stage">
  <img src="img/bg.png" style="left:0;top:0;width:2598px;height:1568px">

  <!-- персонажи: исходники с прозрачностью, прямоугольники и зеркало как в Figma -->
  <img class="char" src="img/athena.png" id="artAthena"
       style="left:1166.6px;top:-184.1px;width:1951.1px;height:2851.6px;--fx:-1">
  <img class="char" src="img/zeus.png" id="artZeus"
       style="left:-479.5px;top:-216.1px;width:2080.3px;height:3040.5px">

  <!-- ЗЕВС: хелсбар идёт первым, поэтому уходит ПОД слой аватара -->
  <div class="hpwrap" style="left:196.2px;top:120.8px">
    <div class="hpempty"></div>
    <div class="hpclip" id="hpZ"><img src="img/hpbar.svg" style="left:0"></div>
    <div class="hptext" id="hpZtext">50/50</div>
  </div>
  <svg style="left:81.2px;top:48.8px" width="226.253" height="197.5" viewBox="0 0 226.253 197.5">
    <defs><clipPath id="clipZ"><path d="M0.270619 12.2918C-1.20736 6.01432 3.5554 0 10.0045 0H174.458C179.098 0 183.128 3.19174 184.191 7.70823L225.983 185.208C227.461 191.486 222.698 197.5 216.249 197.5H51.7956C47.1556 197.5 43.1251 194.308 42.0618 189.792L0.270619 12.2918Z"/></clipPath></defs>
    <image href="img/portrait_z.png" width="226.253" height="197.5" clip-path="url(#clipZ)"/>
  </svg>
  <img src="img/frame_z.svg" style="left:81.2px;top:48.8px">
  <div class="name" style="left:301.2px;top:57.8px">ZEUS</div>
  <div id="pipsZ"></div>
  <div class="val" id="nrgZ" style="left:585px;top:186px;width:130px;height:37px;
       justify-content:flex-start;font-size:30px">3/3</div>
  <img src="img/icon_block.svg" style="left:335.2px;top:246.8px">
  <img src="img/icon_str.svg"   style="left:383.2px;top:248.3px">
  <img src="img/icon_dex.svg"   style="left:431px;top:247px">
  <div class="val" id="blkZ" style="left:330px;top:299px;width:61px;height:34px;font-size:26px">0</div>
  <div class="val" id="strZ" style="left:383px;top:299px;width:48px;height:34px;font-size:26px">0</div>
  <div class="val" id="dexZ" style="left:431px;top:299px;width:48px;height:34px;font-size:26px">0</div>

  <!-- АФИНА -->
  <div class="hpwrap" style="left:1723.2px;top:120.8px">
    <div class="hpempty"></div>
    <div class="hpclip right" id="hpA">
      <img src="img/hpbar.svg" style="right:0;left:auto;transform:scaleX(-1)">
    </div>
    <div class="hptext" id="hpAtext">50/50</div>
  </div>
  <svg style="left:2273.7px;top:48.8px" width="226.253" height="197.5" viewBox="0 0 226.253 197.5">
    <defs><clipPath id="clipA" transform="translate(226.253,0) scale(-1,1)"><path d="M0.270619 12.2918C-1.20736 6.01432 3.5554 0 10.0045 0H174.458C179.098 0 183.128 3.19174 184.191 7.70823L225.983 185.208C227.461 191.486 222.698 197.5 216.249 197.5H51.7956C47.1556 197.5 43.1251 194.308 42.0618 189.792L0.270619 12.2918Z"/></clipPath></defs>
    <image href="img/portrait_a.png" width="226.253" height="197.5" clip-path="url(#clipA)"/>
  </svg>
  <img src="img/frame_a.svg" style="left:2273.7px;top:48.8px">
  <div class="name" style="left:2119.2px;top:59.8px">APHINA</div>
  <div id="pipsA"></div>

<script>
const STAGE_W = 2597.4, STAGE_H = 1568.8;
const stage = document.getElementById('stage');
let scale = 1, offX = 0, offY = 0;

function fit() {
  // visualViewport точнее innerHeight: он учитывает свёрнутую адресную строку
  const vp = window.visualViewport;
  const vw = vp ? vp.width : innerWidth;
  const vh = vp ? vp.height : innerHeight;
  scale = vh / STAGE_H;                // подгон по высоте экрана
  offX = (vw - STAGE_W * scale) / 2;   // центрируем по горизонтали
  offY = 0;
  stage.style.transform = `translate(${offX}px, ${offY}px) scale(${scale})`;
  document.body.classList.toggle('portrait', vw < vh);
}
addEventListener('resize', fit);
addEventListener('orientationchange', () => setTimeout(fit, 120));
if (window.visualViewport) window.visualViewport.addEventListener('resize', fit);

/* ---------- полный экран ---------- */
// запущено с домашнего экрана — браузерной обвязки уже нет
if (matchMedia('(display-mode: fullscreen)').matches ||
    matchMedia('(display-mode: standalone)').matches || navigator.standalone) {
  document.body.classList.add('standalone');
}

async function goFullscreen() {
  const root = document.documentElement;
  const req = root.requestFullscreen || root.webkitRequestFullscreen;
  if (!req) return false;                       // iOS Safari: API недоступен
  try {
    await req.call(root, { navigationUI: 'hide' });
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(() => {});
    }
    return true;
  } catch (e) { return false; }
}

function syncFsClass() {
  const on = !!(document.fullscreenElement || document.webkitFullscreenElement);
  document.body.classList.toggle('fs', on);
  setTimeout(fit, 60);
}
document.addEventListener('fullscreenchange', syncFsClass);
document.addEventListener('webkitfullscreenchange', syncFsClass);

document.getElementById('fs').addEventListener('click', goFullscreen);

// первое касание по игре тоже разворачивает на весь экран
let fsTried = false;
addEventListener('pointerdown', () => {
  if (fsTried) return;
  fsTried = true;
  goFullscreen();
}, { once: false });

fit();

const toStage = (cx, cy) => ({ x: (cx - offX) / scale, y: (cy - offY) / scale });
const sleep = ms => new Promise(r => setTimeout(r, ms));
const $ = id => document.getElementById(id);

/* ---------- карты ---------- */
const EDGE = { attack:'#C74B41', defend:'#3E82BC', magic:'#8C66C6' };
const TYPE_RU = { attack:'АТАКА', defend:'ЗАЩИТА', magic:'МАГИЯ' };

const DB = CARDS;   // 80 настоящих карт набора, база в cards.js

// колода на бой: 20 карт, случайно набранных из набора; у обоих игроков одинаковая
const DECK_SIZE = 20;
let DECK = [];
function buildDeck() {
  return Array.from({ length: DECK_SIZE },
    () => CARD_KEYS[Math.random() * CARD_KEYS.length | 0]);
}

let uid = 1;
const shuffle = a => { a = a.slice();
  for (let i = a.length - 1; i > 0; i--) { const j = Math.random() * (i + 1) | 0; [a[i],a[j]] = [a[j],a[i]]; }
  return a; };

// названия параметров заменяются иконками — так описание занимает меньше места
const IC = {
  str: '<img class="ic" src="img/icon_str.svg" alt="сила">',
  dex: '<img class="ic" src="img/icon_dex.svg" alt="ловкость">',
  blk: '<img class="ic" src="img/icon_block.svg" alt="блок">',
  nrg: '<span class="ic-nrg" title="энергия"></span>',
  hp:  '<span class="ic-hp" title="здоровье">♥</span>',
};
const num = (v, buffed) => buffed ? `<span class="buffed">${v}</span>` : String(v);
const pm = v => (v > 0 ? '+' : '−') + Math.abs(v);   // знак вместо слов «прибавляет»/«отнимает»

// описание строится из эффектов: каждый параметр отдельной строкой,
// знаком и иконкой вместо слов
function cardDesc(c, owner) {
  const lines = c.fx.map(f => {
    switch (f.k) {
      case 'dmg': {
        const v = f.v + owner.str;
        return `урон врагу ${num(v, owner.str > 0)}`;
      }
      case 'hpFoe':  return `${pm(f.v)} ${IC.hp} врагу`;
      case 'hpSelf': return f.v < 0 ? `урон себе ${-f.v}` : `${pm(f.v)} ${IC.hp}`;
      case 'blk': {
        const v = f.v + owner.dex;
        return `+${num(v, owner.dex > 0)} ${IC.blk}`;
      }
      case 'str':    return `${pm(f.v)} ${IC.str}`;
      case 'dex':    return `${pm(f.v)} ${IC.dex}`;
      case 'strFoe': return `${pm(f.v)} ${IC.str} врагу`;
      case 'dexFoe': return `${pm(f.v)} ${IC.dex} врагу`;
      case 'mulStr': return `×${f.v} ${IC.str}`;
      case 'mulDex': return `×${f.v} ${IC.dex}`;
      case 'mulBlk': return `×${f.v} ${IC.blk}`;
      case 'mulNrg': return `×${f.v} ${IC.nrg}`;
      case 'nrg':    return `${pm(f.v)} ${IC.nrg}`;
      case 'draw':   return `+${f.v} карт`;
      case 'trBlock': return `перенос ${IC.blk}${f.v > 1 ? ` ${f.v} х.` : ''}`;
      case 'trNrg':   return `перенос ${IC.nrg}${f.v > 1 ? ` ${f.v} х.` : ''}`;
      case 'copyHand': return 'копия карты из руки';
      case 'copySelf': return 'копия этой карты';
      case 'copyDeck': return 'копия карты в колоду';
      default: return '';
    }
  }).filter(Boolean);
  if (c.exhaust) lines.push('<i>изгнание</i>');
  return lines.map(l => `<div class="dline">${l}</div>`).join('');
}

const NEUTRAL = { str: 0, dex: 0 };
function cardInner(key, owner) {
  const c = DB[key];
  return `<img class="art" src="img/card.png">
     <div class="edge" style="border-color:${EDGE[c.type]}"></div>
     <div class="cost">${c.cost}</div>
     <div class="title">${c.title}</div>
     <div class="desc">${cardDesc(c, owner || NEUTRAL)}</div>
     <div class="type">${TYPE_RU[c.type]}</div>`;
}
const cardHTML = (key, owner) => `<div class="card">${cardInner(key, owner)}</div>`;

function buildCardEl(key, owner, forHand) {
  const el = document.createElement('div');
  el.className = 'card' + (forHand ? ' inhand' : '');
  el.innerHTML = cardInner(key, owner);
  return el;
}

/* ---------- состояние боя (правила из движка Атлантов) ---------- */
const HAND_SIZE = 5, MAX_HP = 50, MAX_NRG = 3;
let S;

function mkPlayer(name, deckKeys) {
  return { name, hp:MAX_HP, block:0, str:0, dex:0, energy:0,
           trBlock:0, trNrg:0,            // счётчики переноса блока и энергии
           deb:{ str:0, dex:0 },          // сколько силы/ловкости снято дебаффом
           debWait:{ str:0, dex:0 },      // сколько своих ходов дебафф ещё держится
           draw:shuffle(deckKeys).map(k => ({ uid:uid++, key:k })), hand:[], disc:[], exh:[] };
}
let lastDeck = null;
// соперник берёт случайную колоду из сохранённых в редакторе
function foeDeck() {
  return decks.length ? decks[Math.random() * decks.length | 0].cards.slice() : buildDeck();
}
function newGame(deckKeys) {
  lastDeck = deckKeys && deckKeys.length ? deckKeys.slice() : null;
  DECK = lastDeck || buildDeck();
  const foe = foeDeck();
  S = { p:[mkPlayer('ZEUS', DECK), mkPlayer('APHINA', foe)], cur:0, turn:1, winner:null, busy:false };
  logBox.innerHTML = '';
  logMsg(`— новый бой, колода ${DECK_SIZE} карт —`, 'turn');
  startTurn(0);
  render();
}
function drawCards(p, n) {
  for (let i = 0; i < n; i++) {
    if (!p.draw.length) {
      if (!p.disc.length) return;
      p.draw = shuffle(p.disc); p.disc = [];
    }
    p.hand.push(p.draw.pop());
  }
}
// правила из PlayerBehaviour.RefreshStatsOnNewTurn оригинальной игры
function startTurn(i) {
  const p = S.p[i];
  let blockNote;
  if (p.trBlock > 0) { p.trBlock--; blockNote = `перенесён ${p.block} (ещё ${p.trBlock} х.)`; }
  else { blockNote = p.block ? `сгорел ${p.block}` : 'нет'; p.block = 0; }
  if (p.trNrg > 0) { p.energy += MAX_NRG; p.trNrg--; }  // энергия копится
  else p.energy = MAX_NRG;
  for (const s of ['str', 'dex']) {     // дебафф силы/ловкости действует один ход
    if (p.debWait[s] > 0) p.debWait[s]--;
    else if (p.deb[s] > 0) {
      const back = p.deb[s];
      p[s] += back; p.deb[s] = 0;
      logMsg(`  дебафф спал: ${s === 'str' ? 'сила' : 'ловкость'} +${back} → ${p[s]} (${p.name})`, 'turn');
    }
  }
  const need = HAND_SIZE - p.hand.length;
  drawCards(p, need);
  logMsg(`  ${p.name}: блок ${blockNote}, энергия ${p.energy}, добор ${need} → рука ${p.hand.length}, ` +
         `колода ${p.draw.length}, сброс ${p.disc.length}`);
}
function applyDamage(t, d) {      // блок поглощает первым
  if (t.block > 0) {
    if (d > t.block) { d -= t.block; t.block = 0; t.hp -= d; return d; }
    t.block -= d; return 0;
  }
  t.hp -= d; return d;
}
function checkWin() {
  if (S.p[1].hp <= 0) S.winner = 0;
  else if (S.p[0].hp <= 0) S.winner = 1;
}

/* ---------- эффекты ---------- */
const ANCHOR = [{ x:520, y:640 }, { x:2000, y:600 }];
const ART = [$('artZeus'), $('artAthena')];

/* ---------- отладочный лог ---------- */
const logBox = $('logBox');
const LOG_MAX = 400;   // история для прокрутки
const FX_RU = {
  dmg:'урон', hpFoe:'прямой урон', hpSelf:'здоровье', blk:'блок',
  str:'сила', dex:'ловкость', strFoe:'сила врагу', dexFoe:'ловкость врагу',
  mulStr:'сила ×', mulDex:'ловкость ×', mulBlk:'блок ×', mulNrg:'энергия ×',
  nrg:'энергия', draw:'добор', trBlock:'перенос блока', trNrg:'перенос энергии',
  copyHand:'копия из руки', copySelf:'копия себя', copyDeck:'копия в колоду',
};
function logMsg(text, cls) {
  const d = document.createElement('div');
  d.className = 'line' + (cls ? ' ' + cls : '');
  d.textContent = text;
  logBox.prepend(d);                                    // новые строки — внизу панели
  while (logBox.children.length > LOG_MAX) logBox.lastChild.remove();
}
function logState(p) {
  return `${p.name} HP${p.hp} бл${p.block} сил${p.str} лов${p.dex} эн${p.energy}`;
}
$('logToggle').addEventListener('click', () => document.body.classList.toggle('nolog'));

/* ---------- просмотр колоды ---------- */
const deckView = $('deckView');
const TYPE_ORDER = ['attack', 'defend', 'magic'];
function showDeck() {
  const p = S.p[0];
  // колода показывается вместе с рукой; карты из руки помечаются
  const tally = {};
  const add = (key, inHand) => {
    const t = tally[key] || (tally[key] = { deck: 0, hand: 0 });
    inHand ? t.hand++ : t.deck++;
  };
  p.draw.forEach(c => add(c.key, false));
  p.hand.forEach(c => add(c.key, true));

  $('dvCount').textContent =
    `${p.draw.length + p.hand.length} карт — колода ${p.draw.length}, рука ${p.hand.length}`;

  let html = '';
  for (const type of TYPE_ORDER) {                       // группировка по типу
    const keys = Object.keys(tally)
      .filter(k => DB[k].type === type)
      .sort((a, b) => DB[a].cost - DB[b].cost || DB[a].no - DB[b].no);   // внутри — по стоимости
    if (!keys.length) continue;
    const total = keys.reduce((s, k) => s + tally[k].deck + tally[k].hand, 0);
    html += `<div class="dv-group" style="color:${EDGE[type]}">${TYPE_RU[type]} — ${total}</div>`;
    html += keys.map(k => {
      const c = DB[k], t = tally[k], n = t.deck + t.hand;
      return `<div class="dv-row" style="border-left-color:${EDGE[type]}">
        <div class="dv-cost">${c.cost}</div>
        <div class="dv-body">
          <div class="dv-name">${c.title}${t.hand ? `<span class="dv-hand">в руке${t.hand > 1 ? ' ×' + t.hand : ''}</span>` : ''}</div>
          <div class="dv-text">${cardDesc(c, p)}</div>
        </div>
        ${n > 1 ? `<div class="dv-mult">×${n}</div>` : ''}
      </div>`;
    }).join('');
  }
  $('dvList').innerHTML = html;
  deckView.classList.add('show');
}
$('pileDraw').addEventListener('click', showDeck);
$('dvClose').addEventListener('click', () => deckView.classList.remove('show'));
deckView.addEventListener('click', e => { if (e.target === deckView) deckView.classList.remove('show'); });

function popup(side, text, kind) {
  const d = document.createElement('div');
  d.className = 'float ' + kind;
  d.textContent = text;
  d.style.left = ANCHOR[side].x + 'px';
  d.style.top = ANCHOR[side].y + 'px';
  stage.appendChild(d);
  setTimeout(() => d.remove(), 1300);
}
function hitShake(side) {
  const el = ART[side];
  el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake');
}

const sign = v => (v > 0 ? '+' : '') + v;

// изменение силы/ловкости с нижней границей 0
function bump(who, stat, delta, side, label, byFoe) {
  const before = who[stat];
  who[stat] = before + delta;           // нижней границы нет: сила и ловкость уходят в минус
  const real = who[stat] - before;
  if (real < 0) {                       // дебафф временный: снятое вернётся владельцу
    who.deb[stat] += -real;
    who.debWait[stat] = byFoe ? 1 : 0;  // чужой доживает до конца хода жертвы
  }
  if (real !== 0) popup(side, label + ' ' + sign(real), 'buff');
}

async function resolveCard(actorIdx, key) {
  const me = S.p[actorIdx], opp = S.p[1 - actorIdx], c = DB[key];
  const foe = 1 - actorIdx;

  for (const f of c.fx) {
    let note = '';
    switch (f.k) {
      case 'dmg': {                                  // урон через блок, +сила
        const total = Math.max(0, f.v + me.str);
        const dealt = applyDamage(opp, total);
        note = `урон ${f.v}${me.str ? ` +${me.str} силы = ${total}` : ''}` +
               ` → блок поглотил ${total - dealt}, по HP ${dealt} (${opp.name} HP ${opp.hp})`;
        popup(foe, '−' + total, 'dmg'); hitShake(foe);
        if (dealt === 0) popup(foe, 'БЛОК', 'blk');
        break;
      }
      case 'hpFoe':                                  // прямой урон, минуя блок
        opp.hp += f.v;
        note = `прямой урон ${-f.v} мимо блока → ${opp.name} HP ${opp.hp}`;
        popup(foe, String(f.v), 'dmg'); hitShake(foe);
        break;
      case 'hpSelf': {
        const was = me.hp;
        me.hp = Math.min(MAX_HP, me.hp + f.v);
        note = `${f.v >= 0 ? 'лечение' : 'цена карты'} ${sign(f.v)} → HP ${was} → ${me.hp}`;
        popup(actorIdx, sign(f.v), f.v >= 0 ? 'heal' : 'dmg');
        break;
      }
      case 'blk': {                                  // блок, +ловкость
        const total = Math.max(0, f.v + me.dex);
        me.block += total;
        note = `блок ${f.v}${me.dex ? ` +${me.dex} ловкости = ${total}` : ''} → всего ${me.block}`;
        popup(actorIdx, '+' + total, 'blk');
        break;
      }
      // сила и ловкость не уходят в минус: ниже нуля дебафф просто не действует,
      // и во всплывающем числе показывается реально снятая величина
      case 'str':    bump(me,  'str', f.v, actorIdx, 'СИЛА', false); break;
      case 'dex':    bump(me,  'dex', f.v, actorIdx, 'ЛОВКОСТЬ', false); break;
      case 'strFoe': bump(opp, 'str', f.v, foe,      'СИЛА', true); break;
      case 'dexFoe': bump(opp, 'dex', f.v, foe,      'ЛОВКОСТЬ', true); break;

      // как в оригинале (FighterBehaviour.ChangeStrength/ChangeAgility):
      // умножение отрицательной характеристики ничего не делает,
      // иначе дебафф лавинообразно усиливал бы сам себя
      case 'mulStr':
        if (me.str > 0) { me.str *= f.v; popup(actorIdx, 'СИЛА ×' + f.v, 'buff'); note = `сила ×${f.v} → ${me.str}`; }
        else note = `сила ×${f.v} не сработала (сила ${me.str})`;
        break;
      case 'mulDex':
        if (me.dex > 0) { me.dex *= f.v; popup(actorIdx, 'ЛОВКОСТЬ ×' + f.v, 'buff'); note = `ловкость ×${f.v} → ${me.dex}`; }
        else note = `ловкость ×${f.v} не сработала (ловкость ${me.dex})`;
        break;
      case 'mulBlk': me.block *= f.v; popup(actorIdx, 'БЛОК ×' + f.v, 'blk'); note = `блок ×${f.v} → ${me.block}`; break;
      case 'mulNrg': me.energy *= f.v; popup(actorIdx, 'ЭНЕРГИЯ ×' + f.v, 'buff'); note = `энергия ×${f.v} → ${me.energy}`; break;

      case 'nrg':     me.energy += f.v; popup(actorIdx, 'ЭНЕРГИЯ ' + sign(f.v), 'buff'); note = `энергия ${sign(f.v)} → ${me.energy}`; break;
      case 'draw': {
        const was = me.hand.length;
        drawCards(me, f.v);
        note = `добор ${f.v} → рука ${was} → ${me.hand.length}, колода ${me.draw.length}, сброс ${me.disc.length}`;
        break;
      }
      case 'trBlock': me.trBlock += f.v; popup(actorIdx, 'БЛОК ПЕРЕНОС', 'blk'); note = `перенос блока на ${f.v} х. (счётчик ${me.trBlock})`; break;
      case 'trNrg':   me.trNrg += f.v;   popup(actorIdx, 'ЭНЕРГИЯ ПЕРЕНОС', 'buff'); note = `перенос энергии на ${f.v} х. (счётчик ${me.trNrg})`; break;

      // копия карты из руки: в прототипе берётся случайная (выбор игроком не сделан)
      case 'copyHand':
        if (me.hand.length) {
          const src = me.hand[Math.random() * me.hand.length | 0];
          me.hand.push({ uid: uid++, key: src.key });
          note = `копия «${DB[src.key].title}» в руку → рука ${me.hand.length}`;
        } else note = 'копия из руки: рука пуста';
        break;
      case 'copySelf':
        me.hand.push({ uid: uid++, key });
        note = `копия «${c.title}» в руку → рука ${me.hand.length}`;
        break;
      case 'copyDeck':
        if (me.draw.length) {
          const src = me.draw[Math.random() * me.draw.length | 0];
          me.draw.splice(Math.random() * (me.draw.length + 1) | 0, 0, { uid: uid++, key: src.key });
          note = `копия «${DB[src.key].title}» в колоду → колода ${me.draw.length}`;
        } else note = 'копия в колоду: колода пуста';
        break;
    }
    logMsg('    ' + (note || `${FX_RU[f.k] || f.k} ${sign(f.v)}`), actorIdx === 0 ? 'you' : 'foe');
    render();
    await sleep(340);
  }
  logMsg(`    = ${logState(me)} | ${logState(opp)}`);
  checkWin();
  render();
  if (S.winner !== null) logMsg(`ПОБЕДА: ${S.p[S.winner].name}`, 'turn');
}

/* ---------- отрисовка ---------- */
const handEls = [];
const PIP_STEP = 84, PIP_TOP = 185.8, PIP_Z_X = 323.2, PIP_A_X = 2183.2;

function renderPips(boxId, energy, side) {
  const box = $(boxId);
  const slots = Math.max(MAX_NRG, energy);   // энергия сверх максимума добавляет сектора
  box.innerHTML = '';
  for (let i = 0; i < slots; i++) {
    const d = document.createElement('div');
    d.className = 'pip' + (i < energy ? '' : ' off');
    d.style.top = PIP_TOP + 'px';
    d.style.left = (side === 0 ? PIP_Z_X + i * PIP_STEP : PIP_A_X - i * PIP_STEP) + 'px';
    box.appendChild(d);
  }
}

function render() {
  const [P, A] = S.p;

  $('hpZ').style.width = Math.max(0, P.hp / MAX_HP * 100) + '%';
  $('hpA').style.width = Math.max(0, A.hp / MAX_HP * 100) + '%';
  $('hpZtext').textContent = Math.max(0, P.hp) + '/' + MAX_HP;
  $('hpAtext').textContent = Math.max(0, A.hp) + '/' + MAX_HP;

  renderPips('pipsZ', P.energy, 0);
  renderPips('pipsA', A.energy, 1);
  $('nrgZ').textContent = P.energy + '/' + MAX_NRG;
  $('nrgA').textContent = A.energy + '/' + MAX_NRG;

  $('blkZ').textContent = P.block; $('strZ').textContent = P.str; $('dexZ').textContent = P.dex;
  $('blkA').textContent = A.block; $('strA').textContent = A.str; $('dexA').textContent = A.dex;

  $('pileDraw').textContent = P.draw.length;
  $('pileDisc').textContent = P.disc.length;
  $('oppBack').textContent = A.hand.length;

  $('turnNo').textContent = 'ХОД ' + S.turn;
  $('turnFlag').textContent = S.winner !== null ? '' : (S.cur === 0 ? 'ВАШ ХОД' : 'ХОД СОПЕРНИКА');
  $('btnEnd').disabled = S.cur !== 0 || S.busy || S.winner !== null;

  renderHand();

  if (S.winner !== null) {
    $('overText').textContent = S.winner === 0 ? 'ПОБЕДА' : 'ПОРАЖЕНИЕ';
    $('over').classList.add('show');
  }
}

const HAND_X = 460, HAND_Y = 1070, HAND_STEP = 328;

function renderHand() {
  const P = S.p[0];
  handEls.forEach(e => e.remove());
  handEls.length = 0;
  P.hand.forEach((card, i) => {
    const el = buildCardEl(card.key, P, true);
    const playable = S.cur === 0 && !S.busy && S.winner === null && DB[card.key].cost <= P.energy;
    if (!playable) el.classList.add('locked');
    el.style.left = (HAND_X + i * HAND_STEP) + 'px';
    el.style.top = HAND_Y + 'px';
    el.dataset.home = el.style.left + '|' + el.style.top;
    if (playable) attachDrag(el, card);
    stage.appendChild(el);
    handEls.push(el);
  });
}

/* ---------- перетаскивание карты в центр ---------- */
const dz = $('dropzone');
const DZ = { x:860, y:300, w:880, h:700 };

function attachDrag(el, card) {
  el.addEventListener('pointerdown', e => {
    if (S.cur !== 0 || S.busy || S.winner !== null) return;
    e.preventDefault();
    const start = toStage(e.clientX, e.clientY);
    const ox = start.x - parseFloat(el.style.left);
    const oy = start.y - parseFloat(el.style.top);
    el.setPointerCapture(e.pointerId);
    el.classList.add('dragging');
    dz.classList.add('show');

    const move = ev => {
      const p = toStage(ev.clientX, ev.clientY);
      el.style.left = (p.x - ox) + 'px';
      el.style.top = (p.y - oy) + 'px';
      dz.classList.toggle('hot', inZone(el));
    };
    // pointercancel обязателен: на телефоне система может прервать жест,
    // и без него карта зависла бы под пальцем
    const finish = play => {
      el.removeEventListener('pointermove', move);
      el.removeEventListener('pointerup', onUp);
      el.removeEventListener('pointercancel', onCancel);
      el.classList.remove('dragging');
      dz.classList.remove('show', 'hot');
      if (play && inZone(el)) playCard(card);
      else { const [hx, hy] = el.dataset.home.split('|'); el.style.left = hx; el.style.top = hy; }
    };
    const onUp = () => finish(true);
    const onCancel = () => finish(false);
    el.addEventListener('pointermove', move);
    el.addEventListener('pointerup', onUp);
    el.addEventListener('pointercancel', onCancel);
  });
}
function inZone(el) {
  const cx = parseFloat(el.style.left) + 167.5, cy = parseFloat(el.style.top) + 238.5;
  return cx > DZ.x && cx < DZ.x + DZ.w && cy > DZ.y && cy < DZ.y + DZ.h;
}

/* ---------- ход игрока ---------- */
async function playCard(card) {
  const P = S.p[0], c = DB[card.key];
  if (c.cost > P.energy || S.busy) { render(); return; }
  S.busy = true;
  P.energy -= c.cost;
  P.hand = P.hand.filter(x => x.uid !== card.uid);
  (c.exhaust ? P.exh : P.disc).push(card);
  logMsg(`Вы: «${c.title}» (${c.cost} эн.)`, 'you');
  render();

  await showPlayed(card.key, P);
  await resolveCard(0, card.key);
  await hidePlayed();

  S.busy = false;
  render();
}

const playedBox = $('played');
async function showPlayed(key, owner) {
  playedBox.innerHTML = '';
  playedBox.appendChild(buildCardEl(key, owner, false));
  playedBox.classList.add('show');
  await sleep(520);
}
async function hidePlayed() {
  playedBox.classList.remove('show');
  await sleep(300);
  playedBox.innerHTML = '';
}

/* ---------- ход скриптового игрока ---------- */
async function botTurn() {
  const B = S.p[1], P = S.p[0];
  await sleep(700);

  let guard = 0;
  while (S.winner === null && guard++ < 12) {
    const options = B.hand.filter(c => DB[c.key].cost <= B.energy);
    if (!options.length) break;
    const pick = chooseCard(options, B, P);
    if (!pick) break;

    const c = DB[pick.key];
    B.energy -= c.cost;
    B.hand = B.hand.filter(x => x.uid !== pick.uid);
    (c.exhaust ? B.exh : B.disc).push(pick);
    logMsg(`Соперник: «${c.title}» (${c.cost} эн.)`, 'foe');
    render();

    await showPlayed(pick.key, B);   // карта соперника сначала показывается в центре
    await resolveCard(1, pick.key);  // и только потом срабатывает её эффект
    await hidePlayed();
    await sleep(220);
  }

  await sleep(400);
  if (S.winner === null) finishTurn(1);
}

// добить -> защититься под угрозой -> усилиться -> бить
function chooseCard(options, me, opp) {
  const fx = c => DB[c.key].fx;
  const thruBlock = c => fx(c).filter(f => f.k === 'dmg').reduce((s,f) => s + Math.max(0, f.v + me.str), 0);
  const direct    = c => fx(c).filter(f => f.k === 'hpFoe').reduce((s,f) => s - f.v, 0);
  const selfHit   = c => fx(c).filter(f => f.k === 'hpSelf' && f.v < 0).reduce((s,f) => s - f.v, 0);
  const kills     = c => direct(c) + Math.max(0, thruBlock(c) - opp.block) >= opp.hp;

  // множитель по неположительной характеристике бесполезен — не тратить на него ход
  const useful = c => fx(c).some(f =>
    f.k === 'mulStr' ? me.str > 0 :
    f.k === 'mulDex' ? me.dex > 0 :
    f.k === 'mulBlk' ? me.block > 0 :
    f.k === 'mulNrg' ? me.energy > 0 : true);

  const safe = options.filter(c => selfHit(c) < me.hp && useful(c));  // и не убить себя ценой карты
  if (!safe.length) return options.find(c => selfHit(c) < me.hp) || options[0];

  const lethal = safe.filter(kills).sort((a,b) => DB[a.key].cost - DB[b.key].cost);
  if (lethal.length) return lethal[0];

  const blocks = safe.filter(c => fx(c).some(f => f.k === 'blk'));
  if (me.hp < MAX_HP * 0.45 && blocks.length && me.block < 10) return blocks[0];

  const util = safe.filter(c => fx(c).some(f => ['draw','nrg','mulNrg','trNrg'].includes(f.k)));
  if (util.length) return util[0];

  if (S.turn <= 2) {
    const buffs = safe.filter(c => fx(c).some(f => ['str','dex'].includes(f.k) && f.v > 0));
    if (buffs.length) return buffs[0];
  }
  const heals = safe.filter(c => fx(c).some(f => f.k === 'hpSelf' && f.v > 0));
  if (me.hp < MAX_HP * 0.6 && heals.length) return heals[0];

  const atk = safe.filter(c => thruBlock(c) + direct(c) > 0)
                  .sort((a,b) => (thruBlock(b) + direct(b)) - (thruBlock(a) + direct(a)));
  if (atk.length) return atk[0];

  return blocks.length ? blocks[0] : safe[0];
}

/* ---------- смена хода ---------- */
function finishTurn(who) {
  const p = S.p[who];
  p.disc.push(...p.hand);          // рука уходит в сброс
  p.hand = [];
  S.cur = 1 - who;
  if (S.cur === 0) S.turn++;
  logMsg(`— ход ${S.turn}: ${S.p[S.cur].name} —`, 'turn');
  startTurn(S.cur);
  render();
  if (S.cur === 1 && S.winner === null) {
    S.busy = true;
    botTurn().then(() => { S.busy = false; render(); });
  }
}

$('btnEnd').onclick = () => { if (S.cur === 0 && !S.busy && S.winner === null) finishTurn(0); };
$('btnAgain').onclick = () => { $('over').classList.remove('show'); newGame(lastDeck); };

/* ---------- хранение колод ---------- */
const DECKS_KEY = 'atlanteans_decks';
function loadDecks() {
  try { return JSON.parse(localStorage.getItem(DECKS_KEY)) || []; } catch (e) { return []; }
}
function storeDecks() {
  try { localStorage.setItem(DECKS_KEY, JSON.stringify(decks)); } catch (e) {}
}
const PRESETS = [
  { name: 'Натиск', cards: [
      'a9','a9','a8','a8','a11','a11','a2','a2','a21','a26','a26',
      'a6','a6','a14','a14','a4','m13','m14','a3','a3' ] },
  { name: 'Оборона', cards: [
      'd22','d25','d25','d21','d21','d12','d12','d13','d6','d6',
      'd28','d28','d9','d9','d18','d17','d27','d27','d23','d23' ] },
  { name: 'Энергия', cards: [
      'm28','m28','m27','m26','m26','m19','m19','d11','d11','d8','d8',
      'a13','a13','m7','a6','a6','m10','m10','m22','a17' ] },
];
function lsGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }

let decks = loadDecks();
// пресеты добавляются один раз и не зависят от того, есть ли уже свои колоды;
// после этого удаление пресета остаётся в силе
const SEED_KEY = 'atlanteans_presets_v1';
if (!lsGet(SEED_KEY)) {
  PRESETS.forEach(pr => {
    if (!decks.some(d => d.name === pr.name)) decks.push({ name: pr.name, cards: pr.cards.slice() });
  });
  lsSet(SEED_KEY, '1');
  storeDecks();
}
let chosen = -1;                 // -1 — случайная колода

/* ---------- стартовый экран ---------- */
const startScreen = $('startScreen'), deckEditor = $('deckEditor');
const showScreen = el => { $('startScreen').classList.remove('show');
  $('deckEditor').classList.remove('show'); if (el) el.classList.add('show'); };

function renderStart() {
  const rows = [`<div class="ss-item${chosen === -1 ? ' sel' : ''}" data-pick="-1">
      <span class="ss-name">Случайная колода</span>
      <span class="ss-info">${DECK_SIZE} карт наугад</span></div>`];
  decks.forEach((d, i) => rows.push(`<div class="ss-item${chosen === i ? ' sel' : ''}" data-pick="${i}">
      <span class="ss-name">${d.name}</span>
      <span class="ss-info">${d.cards.length} карт</span>
      <button class="btn ghost" data-del="${i}" style="padding:8px 20px;font-size:22px">✕</button>
    </div>`));
  $('ssList').innerHTML = rows.join('');
}
$('ssList').addEventListener('click', e => {
  const del = e.target.closest('[data-del]');
  if (del) {
    decks.splice(+del.dataset.del, 1); storeDecks();
    if (chosen >= decks.length) chosen = -1;
    renderStart(); return;
  }
  const pick = e.target.closest('[data-pick]');
  if (pick) { chosen = +pick.dataset.pick; renderStart(); }
});
$('ssPlay').onclick = () => {
  showScreen(null);
  newGame(chosen >= 0 ? decks[chosen].cards : null);
};
$('ssEdit').onclick = () => { openEditor(chosen >= 0 ? decks[chosen] : null); };

/* ---------- редактор колод ---------- */
let edDeck = [], edIndex = -1;
function openEditor(deck) {
  edIndex = deck ? decks.indexOf(deck) : -1;
  edDeck = deck ? deck.cards.slice() : [];
  $('edName').value = deck ? deck.name : '';
  renderEditor();
  showScreen(deckEditor);
}
function renderEditor() {
  $('edCount').textContent = `${edDeck.length} / ${DECK_SIZE}`;
  let slots = '';
  for (let i = 0; i < DECK_SIZE; i++) {
    slots += edDeck[i]
      ? `<div class="mini" data-slot="${i}" title="убрать">${cardHTML(edDeck[i])}</div>`
      : '<div class="slot">+</div>';
  }
  $('edSlots').innerHTML = slots;
  $('edAvail').innerHTML = CARD_KEYS
    .slice().sort((a, b) => DB[a].no - DB[b].no)
    .map(k => `<div class="mini" data-add="${k}" title="добавить">${cardHTML(k)}</div>`).join('');
  $('edSave').disabled = edDeck.length === 0;
}
$('edSlots').addEventListener('click', e => {
  const el = e.target.closest('[data-slot]');
  if (!el) return;
  edDeck.splice(+el.dataset.slot, 1);
  renderEditor();
});
$('edAvail').addEventListener('click', e => {
  const el = e.target.closest('[data-add]');
  if (!el || edDeck.length >= DECK_SIZE) return;
  edDeck.push(el.dataset.add);
  renderEditor();
});
/* ---------- перенос колоды строкой ---------- */
const BY_NO = {};
for (const [k, c] of Object.entries(DB)) BY_NO[c.no] = k;

function deckCode(name, cards) {
  return 'ATL1:' + String(name).replace(/[:|]/g, ' ') + ':' + cards.map(k => DB[k].no).join(',');
}
function parseCode(str) {
  const m = /^ATL1:([^:]*):([\d,]+)$/.exec(String(str || '').trim());
  if (!m) return null;
  const cards = m[2].split(',').map(n => BY_NO[+n]).filter(Boolean);
  return cards.length ? { name: m[1].trim() || 'Импорт', cards: cards.slice(0, DECK_SIZE) } : null;
}

$('edCopy').onclick = async () => {
  if (!edDeck.length) return;
  const code = deckCode(($('edName').value || 'Колода').trim(), edDeck);
  try {
    await navigator.clipboard.writeText(code);
    $('edCopy').textContent = 'СКОПИРОВАНО';
    setTimeout(() => $('edCopy').textContent = 'СКОПИРОВАТЬ', 1600);
  } catch (e) {
    prompt('Скопируйте код колоды:', code);   // если буфер обмена недоступен
  }
};
$('edPaste').onclick = () => {
  const got = parseCode(prompt('Вставьте код колоды:'));
  if (!got) { if (got !== null) return; alert('Код не распознан'); return; }
  edDeck = got.cards;
  if (!$('edName').value.trim()) $('edName').value = got.name;
  edIndex = -1;                                // вставленная колода сохраняется как новая
  renderEditor();
};

$('edClear').onclick = () => { edDeck = []; renderEditor(); };
$('edBack').onclick = () => { renderStart(); showScreen(startScreen); };
$('edSave').onclick = () => {
  if (!edDeck.length) return;
  const name = ($('edName').value || '').trim() || `Колода ${decks.length + 1}`;
  const deck = { name, cards: edDeck.slice() };
  if (edIndex >= 0) decks[edIndex] = deck; else { decks.push(deck); edIndex = decks.length - 1; }
  storeDecks();
  chosen = edIndex;
  renderStart();
  showScreen(startScreen);
};

newGame();
renderStart();
showScreen(startScreen);
</script>
